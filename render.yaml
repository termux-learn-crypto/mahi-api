services:
  - type: web
    name: mahi-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:socketio.app --worker-class eventlet --workers 1 --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.11"
      - key: DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: "INFO"
      - key: STT_API_KEY
        sync: false
      - key: TTS_API_KEY
        sync: false
      - key: WEATHER_API_KEY
        sync: false
      - key: NEWS_API_KEY
        sync: false
      - key: SEARCH_API_KEY
        sync: false
